<head>

    <link rel="stylesheet" href="styles/place-small.css">

    <script src="scripts/places.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <header>

    <main>

                <source srcset="images/hero-medium.webp" media="(mind-width: 500px)">
                <img src="images/hero-small.webp" alt="American Flag" width="500" height="250">

        </div>

    <section class="data">
        <h2> Data</h2>
        <p><strong>Area: </strong>3,809,525 sq mi</p>
        <p><strong>Population: </strong>342.6 million</p>

        <p><strong>Languages: </strong>English and Spanish</p>
        <p><strong>Time Zones: </strong>CDT, MDT, MST, PDT, ADT</p>
